name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 12 * * 1'  # toda segunda-feira às 12h UTC
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -X GET \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/trips?select=count" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "Ping enviado com sucesso"
